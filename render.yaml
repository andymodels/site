services:
  - type: web
    name: andy-models
    runtime: node
    region: oregon
    plan: starter
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: node backend/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: PORT
        value: "3001"
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: PLANILHA_FEMININO_ID
        value: 188f8GtyTpd9CqLPRaQjFHuqMPaNM6tOD8Mkbvt6va9M
      - key: PLANILHA_MASCULINO_ID
        value: 1lVPjjCSQrlMaqa5L41uQOuCP8mOOVtGjdSB2jl4soag
      - key: DRIVE_SYNC_IMAGES
        value: "false"
