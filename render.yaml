services:
  - type: web
    name: andy-models
    runtime: node
    region: oregon
    plan: starter
    buildCommand: cd frontend && npm install && npm run build && cd .. && cd backend && npm install
    startCommand: node backend/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: PORT
        value: "3001"
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        sync: false
